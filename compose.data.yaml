services:
  douyinlive:
    image: douyinlive-tikhub:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: douyinlive-tikhub
    restart: unless-stopped
    ports:
      - "1088:1088"
    volumes:
      - ./data:/app/data
    command: ["--config", "/app/data/config.yaml"]
