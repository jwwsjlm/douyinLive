# 抖音直播配置文件
# 复制此文件为 config.yaml 即可使用

# WebSocket 服务端口
port: "1088"

# 是否输出未知消息类型（调试用）
unknown: false

# pprof 调试配置（内存/协程分析用）
pprof:
  # 是否启用 pprof
  enabled: false
  # pprof 服务端口
  port: "6060"

# 未开播监控配置
monitor:
  # 检查是否开播的时间间隔
  poll_interval: "15s"
  # 未开播期间，向本地 WebSocket 客户端重复推送状态通知的时间间隔
  notify_interval: "30s"

# Cookie 配置（可选，不配置则自动获取）
cookie:
  # 抖音 Cookie（可选，用于需要登录态的请求）
  # 获取方式：浏览器打开 https://live.douyin.com -> F12 -> Network -> 复制任意请求的 Cookie
  douyin: ""
