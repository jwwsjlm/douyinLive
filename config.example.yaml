# 抖音直播配置文件
# 复制此文件为 config.yaml 即可使用

# WebSocket 服务端口
port: "1088"

# 是否输出未知消息类型（调试用）
unknown: false

# 日志配置
log:
  # 可选: debug, info, warn, error
  level: "info"

# WebSocket 签名配置
sign:
  # 留空表示使用默认值 local，也可以显式填写 local 或 tikhub。
  provider: ""

# TikHub 在线签名配置
tikhub:
  # 当 sign.provider 为 tikhub 时必填，也可用 APP_TIKHUB_KEY 或 --tikhub-key 覆盖
  key: ""

# 未开播监控配置
monitor:
  # 检查是否开播的时间间隔
  poll_interval: "15s"
  # 未开播期间，向本地 WebSocket 客户端重复推送状态通知的时间间隔
  notify_interval: "30s"

# Cookie 配置（可选，不配置则自动获取）
cookie:
  # 默认 Cookie：没有单独配置房间 Cookie 时，会回退使用它
  douyin: ""
  # 按直播间 ID 单独配置 Cookie
  # 适合多个直播间分别使用不同账号登录态的场景
  rooms:
    # "516466932480": "ttwid=...; sessionid=..."
    # "123456789": "ttwid=...; sessionid=..."
