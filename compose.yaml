services:
  douyinlive:
    image: douyinlive-tikhub:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: douyinlive-tikhub
    restart: unless-stopped
    ports:
      - "1088:1088"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
