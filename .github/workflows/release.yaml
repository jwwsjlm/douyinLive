name: release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: douyinLive-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: douyinLive-linux-arm64
          - goos: windows
            goarch: amd64
            asset_name: douyinLive-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset_name: douyinLive-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: douyinLive-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.asset_name }}" ./cmd/main

      - name: Package asset
        run: |
          mkdir -p release
          cp README.md LICENSE config.example.yaml release/
          cp "dist/${{ matrix.asset_name }}" release/
          cd release
          tar -czf "../${{ matrix.asset_name }}.tar.gz" *

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/douyinlive
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.event.release.tag_name, '-test') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
